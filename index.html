<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>חוות דעת רחובות — ניהול מלאי</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;direction:rtl;font-size:14px}
.app{max-width:440px;margin:0 auto;background:#fff;min-height:100vh;display:flex;flex-direction:column}
.screen{display:none;flex-direction:column;flex:1}
.screen.active{display:flex}
.hero{background:#1a3a52;color:#fff;padding:2rem 1.5rem;text-align:center}
.hero h1{font-size:22px;margin-bottom:6px}
.hero p{font-size:13px;opacity:.8}
.body{padding:1.5rem;flex:1}
.btn{display:block;width:100%;padding:13px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;margin-bottom:10px;font-family:Arial,sans-serif}
.btn-primary{background:#1a3a52;color:#fff}
.btn-outline{background:#fff;color:#1a3a52;border:1.5px solid #1a3a52}
select{width:100%;padding:10px;border:1.5px solid #cdd5df;border-radius:8px;font-size:14px;margin-bottom:12px;font-family:Arial,sans-serif}
.topbar{background:#1a3a52;color:#fff;padding:.9rem 1.1rem;display:flex;align-items:center;justify-content:space-between}
.topbar h2{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;opacity:.7}
.topbar-btn{background:rgba(255,255,255,.2);border:none;color:#fff;padding:5px 12px;border-radius:8px;cursor:pointer;font-size:12px}
.tabs{display:flex;border-bottom:1px solid #e0e6ed}
.tab{flex:1;padding:10px;text-align:center;font-size:12px;border:none;background:none;cursor:pointer;border-bottom:2px solid transparent;color:#6b7c93}
.tab.on{color:#1a3a52;border-bottom-color:#1a3a52;font-weight:600}
.scroll{flex:1;overflow-y:auto;padding:.9rem}
.card{background:#fff;border:1px solid #e0e6ed;border-radius:10px;padding:.9rem;margin-bottom:9px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.dept-row{display:flex;align-items:center;gap:12px;cursor:pointer}
.dept-icon{width:44px;height:44px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.dept-name{font-size:14px;font-weight:600}
.dept-sub{font-size:11px;color:#6b7c93;margin-top:2px}
.badge{font-size:11px;font-weight:600;padding:3px 8px;border-radius:20px}
.badge-red{background:#fde8e8;color:#c0392b}
.badge-green{background:#e8f8f0;color:#1e8449}
.badge-gray{background:#f0f4f8;color:#6b7c93}
.pcard{background:#fff;border:1px solid #e0e6ed;border-radius:10px;padding:.75rem .9rem;margin-bottom:7px}
.pcard-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:6px}
.pcard-name{font-size:13px;font-weight:600;flex:1}
.pcard-btns{display:flex;gap:4px}
.ibtn{background:none;border:1px solid #e0e6ed;border-radius:6px;padding:4px 8px;font-size:12px;cursor:pointer;color:#6b7c93}
.ibtn.del:hover{background:#fff0f0;color:#c0392b}
.ptags{display:flex;gap:5px;flex-wrap:wrap}
.ptag{font-size:11px;padding:2px 7px;border-radius:20px;background:#f0f4f8;border:1px solid #e0e6ed;color:#6b7c93}
.ptag-dept{background:#e8f0f7;color:#1a3a52}
.irow{background:#fff;border:1px solid #e0e6ed;border-radius:10px;padding:.75rem .9rem;margin-bottom:8px}
.irow-top{display:flex;align-items:flex-start;gap:8px;margin-bottom:7px}
.dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.dot-ok{background:#1e8449}
.dot-low{background:#d68910}
.dot-crit{background:#c0392b}
.dot-unk{background:#bdc3c7}
.irow-name{font-size:13px;font-weight:600;flex:1}
.irow-tags{display:flex;gap:5px;margin-bottom:8px}
.irow-footer{display:flex;align-items:center;gap:8px}
.irow-label{font-size:12px;color:#6b7c93;flex:1}
.qty{width:74px;text-align:center;padding:7px;border-radius:8px;border:1px solid #cdd5df;font-size:16px;font-weight:600;font-family:Arial,sans-serif}
.qty:focus{outline:none;border-color:#1a3a52}
.qty-unit{font-size:11px;color:#6b7c93}
.fab{padding:.85rem;border-top:1px solid #e0e6ed;flex-shrink:0}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:flex-end;justify-content:center;z-index:100}
.modal-bg.open{display:flex}
.modal{background:#fff;border-radius:18px 18px 0 0;padding:1.25rem;width:100%;max-width:440px;max-height:88vh;overflow-y:auto}
.modal-handle{width:36px;height:4px;background:#e0e6ed;border-radius:2px;margin:0 auto 1rem}
.modal-title{font-size:16px;font-weight:700;margin-bottom:1rem}
.f-label{font-size:12px;color:#6b7c93;margin-bottom:4px;display:block}
.f-input{width:100%;padding:9px 12px;border:1px solid #cdd5df;border-radius:8px;font-size:13px;margin-bottom:10px;font-family:Arial,sans-serif}
.f-input:focus{outline:none;border-color:#1a3a52}
.f-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.modal-actions{display:flex;gap:8px;margin-top:4px}
.modal-actions .btn{margin:0}
.success-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:2rem;text-align:center}
.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#1a3a52;color:#fff;padding:9px 20px;border-radius:20px;font-size:13px;z-index:200;display:none;white-space:nowrap}
.toast.show{display:block;animation:ft 2.5s ease forwards}
@keyframes ft{0%{opacity:0}12%{opacity:1}80%{opacity:1}100%{opacity:0}}
.empty{text-align:center;padding:2.5rem 1rem;color:#6b7c93}
.section-label{font-size:11px;font-weight:600;color:#6b7c93;text-transform:uppercase;letter-spacing:.05em;margin:10px 0 6px}
.rrow{display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #e0e6ed;font-size:13px}
.rrow:last-child{border:none}
.rv-ok{color:#1e8449;font-weight:600}
.rv-low{color:#d68910;font-weight:600}
.rv-crit{color:#c0392b;font-weight:600}
.alert{background:#fef5e7;border:1px solid #f0c040;border-radius:10px;padding:.75rem 1rem;margin-bottom:10px;font-size:12px;color:#7d6608}
.move-btn{width:100%;padding:10px 14px;border:1px solid #e0e6ed;border-radius:8px;background:#f0f4f8;font-size:13px;cursor:pointer;text-align:right;margin-bottom:6px}
.move-btn:hover{background:#e8f0f7;border-color:#1a3a52}
.move-btn.cur{opacity:.4;cursor:default;pointer-events:none}
</style>
</head>
<body>
<div class="app">

<div id="s-login" class="screen active">
  <div class="hero">
    <img src="logo.png" alt="לוגו" style="width:130px;height:auto;margin-bottom:12px;filter:brightness(0) invert(1)">
    <h1>חוות דעת רחובות</h1>
    <p>מערכת ניהול מלאי</p>
  </div>
  <div class="body">
    <button class="btn btn-primary" id="btn-admin">כניסת אחראית מלאים</button>
    <div style="text-align:center;color:#6b7c93;margin:10px 0;font-size:13px">או</div>
    <label class="f-label">כניסת סגנית — בחרי מחלקה</label>
    <select id="dept-select">
      <option value="reception">קבלה</option>
      <option value="surgery">חדר ניתוח</option>
      <option value="hospitalization">אשפוז ומעבדה</option>
      <option value="community">רפואת קהילה וחדרים</option>
    </select>
    <button class="btn btn-outline" id="btn-deputy">כניסה לספירת מלאי</button>
    <p style="font-size:11px;color:#6b7c93;text-align:center;margin-top:1rem">גרסה 1.0 · חוות דעת רחובות</p>
  </div>
</div>

<div id="s-admin" class="screen">
  <div class="topbar">
    <div><div class="topbar-sub">אחראית מלאים</div><h2>חוות דעת רחובות</h2></div>
    <button class="topbar-btn" id="btn-logout-admin">יציאה</button>
  </div>
  <div class="tabs">
    <button class="tab on" id="tab-reports-btn">דיווחים</button>
    <button class="tab" id="tab-products-btn">מוצרים</button>
  </div>
  <div id="tab-reports" class="scroll"><div class="empty">טוען...</div></div>
  <div id="tab-products" style="display:none;flex:1;flex-direction:column;overflow:hidden">
    <div style="padding:.75rem .9rem .25rem"><input class="f-input" id="p-search" type="text" placeholder="חיפוש..." style="margin:0"></div>
    <div class="scroll" id="p-list"></div>
    <div class="fab"><button class="btn btn-primary" id="btn-add" style="margin:0">+ הוסף מוצר</button></div>
  </div>
</div>

<div id="s-deputy" class="screen">
  <div class="topbar">
    <div><div class="topbar-sub">ספירת מלאי</div><h2 id="dep-title">קבלה</h2></div>
    <button class="topbar-btn" id="btn-logout-deputy">יציאה</button>
  </div>
  <div class="scroll" id="dep-items"></div>
  <div class="fab"><button class="btn btn-primary" id="btn-submit" style="margin:0">שלח דיווח מלאי</button></div>
</div>

<div id="s-success" class="screen">
  <div class="topbar"><h2>דיווח נשלח</h2></div>
  <div class="success-body">
    <div style="font-size:56px;margin-bottom:1rem">✅</div>
    <div style="font-size:20px;font-weight:700;margin-bottom:8px">הדיווח נשלח בהצלחה!</div>
    <div style="font-size:13px;color:#6b7c93;margin-bottom:1.5rem">אחראית המלאים קיבלה את הספירה</div>
    <div class="card" id="success-summary" style="width:100%;text-align:right"></div>
    <button class="btn btn-outline" id="btn-back" style="margin-top:1rem">חזרה לדף הבית</button>
  </div>
</div>

</div>

<div class="modal-bg" id="m-product">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-product-title">הוספת מוצר</div>
    <label class="f-label">שם המוצר</label>
    <input class="f-input" id="f-name" placeholder="Frontline Spot On Cat">
    <label class="f-label">קטגוריה</label>
    <input class="f-input" id="f-cat" placeholder="נגד פרעושים">
    <label class="f-label">מחלקה</label>
    <select class="f-input" id="f-dept" style="margin-bottom:10px">
      <option value="reception">קבלה</option>
      <option value="surgery">חדר ניתוח</option>
      <option value="hospitalization">אשפוז ומעבדה</option>
      <option value="community">רפואת קהילה וחדרים</option>
    </select>
    <div class="f-grid">
      <div><label class="f-label">מינימום</label><input class="f-input" id="f-min" type="number" min="1" placeholder="10"></div>
      <div><label class="f-label">יחידה</label><input class="f-input" id="f-unit" placeholder="יח'"></div>
    </div>
    <div class="modal-actions">
      <button class="btn btn-outline" id="btn-cancel-product">ביטול</button>
      <button class="btn btn-primary" id="btn-save-product">שמור</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="m-move">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">העברה למחלקה</div>
    <p style="font-size:12px;color:#6b7c93;margin-bottom:1rem" id="m-move-name"></p>
    <div id="m-move-list"></div>
    <button class="btn btn-outline" id="btn-cancel-move">ביטול</button>
  </div>
</div>

<div class="modal-bg" id="m-delete">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">הסרת מוצר</div>
    <p style="font-size:13px;color:#6b7c93;margin-bottom:6px">להסיר את:</p>
    <p style="font-size:14px;font-weight:700;margin-bottom:1rem" id="m-del-name"></p>
    <div class="modal-actions">
      <button class="btn btn-outline" id="btn-cancel-del">ביטול</button>
      <button class="btn" style="background:#c0392b;color:#fff" id="btn-confirm-del">הסר</button>
    </div>
  </div>
</div>

<div class="modal-bg" id="m-report">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title" id="m-report-title">פרטי דיווח</div>
    <div id="m-report-content"></div>
    <button class="btn btn-outline" id="btn-close-report" style="margin-top:1rem">סגור</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const SUPABASE_URL = 'https://ynjfphgtgtesblvrxhpf.supabase.co';
const SUPABASE_KEY = 'sb_publishable_QXUxKG4FQi7EaWYPdpavzQ_ESGTzRS8';
const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

const DEPTS = {reception:'קבלה',surgery:'חדר ניתוח',hospitalization:'אשפוז ומעבדה',community:'רפואת קהילה וחדרים'};
const ICONS = {reception:'💊',surgery:'🔬',hospitalization:'🧪',community:'🏠'};

let products = [], reports = [], depValues = {}, currentDept = '', editId = null, delId = null, moveId = null;

function show(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.className='toast show'; setTimeout(()=>t.className='toast',2600); }
function openM(id) { document.getElementById(id).classList.add('open'); }
function closeM(id) { document.getElementById(id).classList.remove('open'); }
function getStatus(v,min) { if(v===''||v===null||v===undefined)return'unk'; const n=parseInt(v); if(isNaN(n))return'unk'; if(n<min*.4)return'crit'; if(n<min*.7)return'low'; return'ok'; }

async function loadProducts() {
  const {data} = await db.from('products').select('*').eq('is_active',true).order('department').order('name');
  products = data||[];
}
async function loadReports() {
  const since = new Date(Date.now()-7*24*60*60*1000).toISOString();
  const {data} = await db.from('inventory_reports').select('*,report_items(*)').gte('created_at',since).order('created_at',{ascending:false});
  reports = data||[];
}

// BUTTONS
document.getElementById('btn-admin').onclick = async function() {
  show('s-admin');
  await loadProducts(); await loadReports();
  renderReports(); renderProducts();
};
document.getElementById('btn-deputy').onclick = async function() {
  currentDept = document.getElementById('dept-select').value;
  depValues = {};
  document.getElementById('dep-title').textContent = DEPTS[currentDept];
  show('s-deputy');
  await loadProducts();
  renderDepItems();
};
document.getElementById('btn-logout-admin').onclick = function() { show('s-login'); };
document.getElementById('btn-logout-deputy').onclick = function() { show('s-login'); };
document.getElementById('btn-back').onclick = function() { show('s-login'); };
document.getElementById('btn-add').onclick = function() {
  editId=null;
  document.getElementById('m-product-title').textContent='הוספת מוצר';
  ['f-name','f-cat','f-min','f-unit'].forEach(i=>document.getElementById(i).value='');
  openM('m-product');
};
document.getElementById('btn-cancel-product').onclick = function() { closeM('m-product'); };
document.getElementById('btn-cancel-move').onclick = function() { closeM('m-move'); };
document.getElementById('btn-cancel-del').onclick = function() { closeM('m-delete'); };
document.getElementById('btn-close-report').onclick = function() { closeM('m-report'); };
document.getElementById('p-search').oninput = renderProducts;

document.getElementById('tab-reports-btn').onclick = function() {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); this.classList.add('on');
  document.getElementById('tab-reports').style.display='block';
  document.getElementById('tab-products').style.display='none';
};
document.getElementById('tab-products-btn').onclick = function() {
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('on')); this.classList.add('on');
  document.getElementById('tab-reports').style.display='none';
  document.getElementById('tab-products').style.display='flex';
};

document.getElementById('btn-save-product').onclick = async function() {
  const name=document.getElementById('f-name').value.trim();
  const cat=document.getElementById('f-cat').value.trim();
  const dept=document.getElementById('f-dept').value;
  const min=parseInt(document.getElementById('f-min').value)||1;
  const unit=document.getElementById('f-unit').value.trim()||"יח'";
  if(!name){document.getElementById('f-name').focus();return;}
  const dup=products.find(p=>p.name.toLowerCase()===name.toLowerCase()&&p.id!=editId);
  if(dup){toast('מוצר זה כבר קיים ב'+DEPTS[dup.department]);return;}
  if(editId) {
    await db.from('products').update({name,category:cat,department:dept,min_stock:min,unit}).eq('id',editId);
    toast('עודכן');
  } else {
    await db.from('products').insert({name,category:cat,department:dept,min_stock:min,unit});
    toast('נוסף');
  }
  closeM('m-product'); await loadProducts(); renderProducts();
};

document.getElementById('btn-confirm-del').onclick = async function() {
  await db.from('products').update({is_active:false}).eq('id',delId);
  closeM('m-delete'); toast('הוסר'); await loadProducts(); renderProducts();
};

document.getElementById('btn-submit').onclick = async function() {
  const dp = products.filter(p=>p.department===currentDept);
  let ok=0,low=0,crit=0,unk=0;
  const items = dp.map(p=>{
    const v=depValues[p.id]; const qty=v!==undefined&&v!==''?parseInt(v):null;
    const st=getStatus(v,p.min_stock);
    if(st==='ok')ok++;else if(st==='low')low++;else if(st==='crit')crit++;else unk++;
    return{product_id:p.id,product_name:p.name,actual_qty:qty,min_stock:p.min_stock,unit:p.unit,status:st==='unk'?'unknown':st};
  });
  const {data:rep} = await db.from('inventory_reports').insert({
    department:currentDept,submitted_by:DEPTS[currentDept],
    total_items:dp.length,ok_count:ok,low_count:low,critical_count:crit,unknown_count:unk
  }).select().single();
  if(rep) await db.from('report_items').insert(items.map(i=>({...i,report_id:rep.id})));
  let html=`<div style="font-size:13px;font-weight:700;margin-bottom:10px">סיכום — ${DEPTS[currentDept]}</div>`;
  if(ok) html+=`<div class="rrow"><span>תקין</span><span class="rv-ok">${ok} פריטים</span></div>`;
  if(low) html+=`<div class="rrow"><span>נמוך</span><span class="rv-low">${low} פריטים</span></div>`;
  if(crit) html+=`<div class="rrow"><span>חסר</span><span class="rv-crit">${crit} פריטים</span></div>`;
  document.getElementById('success-summary').innerHTML=html;
  show('s-success');
};

document.querySelectorAll('.modal-bg').forEach(m=>m.addEventListener('click',e=>{if(e.target===m)m.classList.remove('open')}));

function renderReports() {
  const el=document.getElementById('tab-reports');
  if(!reports.length){el.innerHTML='<div class="empty">טרם התקבלו דיווחים השבוע</div>';return;}
  const crit=reports.reduce((a,r)=>a+(r.critical_count||0),0);
  let html=crit>0?`<div class="alert">⚠️ ${crit} פריטים קריטיים דורשים טיפול</div>`:'';
  html+=`<div class="section-label">דיווחים (${reports.length})</div>`;
  reports.forEach(r=>{
    const c=r.critical_count||0, l=r.low_count||0;
    html+=`<div class="card" style="cursor:pointer" onclick="viewReport(${r.id})">
      <div style="display:flex;align-items:center;gap:10px">
        <div style="font-size:20px">${ICONS[r.department]||'📦'}</div>
        <div style="flex:1"><div style="font-weight:600;font-size:13px">${DEPTS[r.department]||r.department}</div>
        <div style="font-size:11px;color:#6b7c93">${new Date(r.created_at).toLocaleString('he-IL',{hour:'2-digit',minute:'2-digit',day:'2-digit',month:'2-digit'})}</div></div>
        ${c>0?`<span class="badge badge-red">${c} חסרים</span>`:l>0?`<span class="badge" style="background:#fef5e7;color:#d68910">${l} נמוך</span>`:'<span class="badge badge-green">תקין</span>'}
      </div>
    </div>`;
  });
  el.innerHTML=html;
}

function viewReport(id) {
  const r=reports.find(x=>x.id==id); if(!r)return;
  document.getElementById('m-report-title').textContent='דיווח — '+DEPTS[r.department];
  const items=r.report_items||[];
  let html=items.map(it=>{
    const cls=it.status==='ok'?'rv-ok':it.status==='low'?'rv-low':it.status==='critical'?'rv-crit':'';
    const lbl=it.status==='ok'?'תקין':it.status==='low'?'נמוך':it.status==='critical'?'חסר':'לא דווח';
    return `<div class="rrow"><span style="font-size:12px">${it.product_name}</span><span class="${cls}">${it.actual_qty!==null?it.actual_qty+' '+(it.unit||''):'—'} (${lbl})</span></div>`;
  }).join('');
  document.getElementById('m-report-content').innerHTML=html||'<p style="color:#6b7c93">אין פרטים</p>';
  openM('m-report');
}

function renderProducts() {
  const q=(document.getElementById('p-search').value||'').toLowerCase();
  let list=products.filter(p=>!q||p.name.toLowerCase().includes(q)||p.category.toLowerCase().includes(q));
  const el=document.getElementById('p-list');
  if(!list.length){el.innerHTML='<div class="empty">לא נמצאו מוצרים</div>';return;}
  const byDept={};
  list.forEach(p=>{if(!byDept[p.department])byDept[p.department]=[];byDept[p.department].push(p);});
  let html='';
  Object.entries(byDept).forEach(([dept,items])=>{
    html+=`<div class="section-label">${DEPTS[dept]||dept} (${items.length})</div>`;
    items.forEach(p=>{
      html+=`<div class="pcard">
        <div class="pcard-top"><div class="pcard-name">${p.name}</div>
        <div class="pcard-btns">
          <button class="ibtn" onclick="openMove(${p.id})">↔</button>
          <button class="ibtn" onclick="openEdit(${p.id})">✎</button>
          <button class="ibtn del" onclick="openDel(${p.id})">✕</button>
        </div></div>
        <div class="ptags"><span class="ptag ptag-dept">${DEPTS[p.department]||p.department}</span><span class="ptag">${p.category}</span><span class="ptag">מינ׳ ${p.min_stock} ${p.unit}</span></div>
      </div>`;
    });
  });
  el.innerHTML=html;
}

function openEdit(id) {
  const p=products.find(x=>x.id==id); if(!p)return;
  editId=id;
  document.getElementById('m-product-title').textContent='עריכת מוצר';
  document.getElementById('f-name').value=p.name;
  document.getElementById('f-cat').value=p.category;
  document.getElementById('f-min').value=p.min_stock;
  document.getElementById('f-unit').value=p.unit;
  document.getElementById('f-dept').value=p.department;
  openM('m-product');
}
function openMove(id) {
  moveId=id; const p=products.find(x=>x.id==id);
  document.getElementById('m-move-name').textContent=p.name;
  let html='';
  Object.entries(DEPTS).forEach(([k,n])=>{
    const cur=k===p.department;
    html+=`<button class="move-btn ${cur?'cur':''}" ${cur?'':'onclick="doMove(\''+k+'\')"'}>${n}${cur?' ← נוכחית':''}</button>`;
  });
  document.getElementById('m-move-list').innerHTML=html;
  openM('m-move');
}
async function doMove(dept) {
  await db.from('products').update({department:dept}).eq('id',moveId);
  closeM('m-move'); toast('הועבר ל'+DEPTS[dept]); await loadProducts(); renderProducts();
}
function openDel(id) {
  delId=id; const p=products.find(x=>x.id==id);
  document.getElementById('m-del-name').textContent=p?p.name:'';
  openM('m-delete');
}

function renderDepItems() {
  const dp=products.filter(p=>p.department===currentDept);
  let html=`<div class="card" style="background:#e8f0f7;border-color:#c5d8ea;margin-bottom:12px">
    <div style="font-size:13px;font-weight:600;color:#1a3a52;margin-bottom:3px">ספירת מלאי — ${DEPTS[currentDept]}</div>
    <div style="font-size:12px;color:#2471a3">הכניסי כמה יש מכל מוצר</div>
  </div>`;
  dp.forEach(p=>{
    const v=depValues[p.id]!==undefined?depValues[p.id]:'';
    const st=getStatus(v,p.min_stock);
    const dc={ok:'dot-ok',low:'dot-low',crit:'dot-crit',unk:'dot-unk'}[st];
    html+=`<div class="irow" id="ir-${p.id}">
      <div class="irow-top"><div class="dot ${dc}" id="dot-${p.id}"></div><div class="irow-name">${p.name}</div></div>
      <div class="irow-tags"><span class="ptag">${p.category}</span><span class="ptag">מינ׳ ${p.min_stock} ${p.unit}</span></div>
      <div class="irow-footer">
        <div class="irow-label">כמה יש כרגע?</div>
        <input type="number" class="qty" min="0" value="${v}" placeholder="0" onchange="updDep(${p.id},${p.min_stock},this.value)">
        <span class="qty-unit">${p.unit}</span>
      </div>
    </div>`;
  });
  document.getElementById('dep-items').innerHTML=html;
}
function updDep(id,min,v) {
  depValues[id]=v;
  const st=getStatus(v,min);
  const dot=document.getElementById('dot-'+id);
  if(dot) dot.className='dot '+{ok:'dot-ok',low:'dot-low',crit:'dot-crit',unk:'dot-unk'}[st];
}
</script>
</body>
</html>
